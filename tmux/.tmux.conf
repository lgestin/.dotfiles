unbind C-b
set-option -g prefix C-space
bind-key C-space send-prefix

# Set true color
set -g default-terminal 'tmux-256color'
set -as terminal-features ",xterm*:RGB"

# Let vim's autoread (and similar) react to focus changes inside tmux
set -g focus-events on

# Larger scrollback buffer
set -g history-limit 50000

# Split panes using | and - in cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with prefix + hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + HJKL (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Show pane numbers longer when using prefix + q
set -g display-panes-time 2000

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Start windows and panes at 1 instead of 0 for easier navigation
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Fullscreen session switcher
bind C-s choose-tree -Zs

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'TechnicalDC/tmux-ayu-theme'

# vi-mode for copy mode (pairs with tmux-yank)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set-option -g status-position top
set -g status-keys vi
set -g status-right-length 50
set -g status-right "#[fg=#aad94c,bg=#101521,nobold,nounderscore,noitalics]#[fg=#101521,bg=#aad94c,bold] #h "
set -g status-left "#[fg=#101521,bg=#aad94c,bold]   #S #{prefix_highlight}#[fg=#aad94c,bg=#101521,nobold,nounderscore,noitalics]"

